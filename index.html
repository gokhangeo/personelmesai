<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mersin Kadastro - İzin Takip Sistemi</title>
    <!-- SheetJS (Excel okuma/yazma) kütüphanesi -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary-color: #007bff;
            --secondary-color: #6c757d;
            --danger-color: #dc3545;
            --success-color: #28a745;
            --warning-color: #ffc107;
            --info-color: #17a2b8;
            --background-color: #f8f9fa;
            --font-color: #212529;
            --border-color: #dee2e6;
            --today-bg: #e6f2ff;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background-color: var(--background-color);
            color: var(--font-color);
            padding: 15px;
        }
        
        /* GİRİŞ EKRANI */
        #login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: var(--primary-color);
            margin: -15px;
        }
        #login-box {
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            text-align: center;
            width: 300px;
        }
        #login-box h2 { color: var(--primary-color); margin-top: 0; }
        #password-input {
            width: calc(100% - 20px);
            padding: 10px;
            margin-top: 15px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            font-size: 1rem;
        }
        #login-button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        #login-button:hover { background-color: #0056b3; }
        #login-status { color: var(--danger-color); margin-top: 10px; min-height: 1.2em; }

        /* ANA UYGULAMA */
        .app-content { display: none; }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            overflow: hidden;
            margin-bottom: 20px;
        }

        /* HEADER & NAVIGATION */
        .app-header {
            background-color: #343a40;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .app-title { font-size: 1.2rem; font-weight: bold; }
        .action-buttons { display: flex; gap: 10px; }
        .btn-action {
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .btn-download-plan { background-color: var(--info-color); }
        .btn-download-plan:hover { background-color: #138496; }
        .btn-manage-personel { background-color: var(--secondary-color); }
        .btn-manage-personel:hover { background-color: #5a6268; }

        /* TAKVİM */
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background-color: var(--primary-color);
            color: white;
        }
        .calendar-header button {
            background: none;
            border: 1px solid white;
            color: white;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
        }
        .calendar-header button:hover { background-color: rgba(255,255,255,0.2); }
        #current-month-year { font-size: 1.5rem; font-weight: bold; }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
        .day-header, .day-cell {
            padding: 10px;
            border-right: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
        }
        .day-header { font-weight: bold; text-align: center; background-color: #f1f1f1; }
        .day-cell {
            min-height: 120px;
            cursor: pointer;
            transition: background-color 0.2s;
            position: relative;
        }
        .day-cell:hover { background-color: #f5f5f5; }
        .day-number { font-weight: bold; margin-bottom: 5px; }
        .day-cell.other-month { color: #ccc; background-color: #fafafa; }
        .day-cell.today { background-color: var(--today-bg); }
        
        /* İZİN ETİKETLERİ */
        .izin-entry {
            font-size: 0.75rem;
            padding: 3px 5px;
            margin-top: 3px;
            border-radius: 3px;
            color: #333;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .izin-entry:hover { opacity: 0.9; }
        
        /* İzin Türüne Göre Renkler */
        .type-gunluk { background-color: var(--warning-color); } /* Sarı */
        .type-saatlik { background-color: #ffdab9; } /* Açık Turuncu */
        .type-yillik { background-color: var(--success-color); color: white; } /* Yeşil */

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5);
            align-items: center; justify-content: center;
        }
        .modal-content {
            background-color: #fefefe;
            margin: auto;
            padding: 25px;
            border: 1px solid #888;
            width: 90%; max-width: 500px;
            border-radius: 8px;
            position: relative;
        }
        .close-button {
            position: absolute;
            top: 10px; right: 15px;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer; color: #aaa;
        }
        
        /* Form Elemanları */
        #izin-form { display: flex; flex-direction: column; gap: 15px; }
        label { font-weight: 600; margin-bottom: 5px; display: block; }
        select, input { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        
        .radio-group { display: flex; gap: 15px; margin-bottom: 5px; }
        .radio-group label { font-weight: normal; display: flex; align-items: center; gap: 5px; cursor: pointer; }
        .radio-group input { width: auto; }

        .date-range-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .form-buttons { display: grid; grid-template-columns: 1fr auto; gap: 10px; margin-top: 10px; }
        #save-button { background-color: var(--primary-color); color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; }
        #delete-button { background-color: var(--danger-color); color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; display: none; }
        
        /* RAPOR ALANI */
        .summary-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; border-bottom: 2px solid var(--border-color);
        }
        .summary-header h3 { margin: 0; color: var(--primary-color); }
        .report-buttons button {
            background-color: var(--success-color); color: white;
            border: none; padding: 8px 12px; border-radius: 5px;
            cursor: pointer; margin-left: 5px;
        }
        .report-buttons button:hover { background-color: #218838; }

        /* Personel Listesi Modal İçeriği */
        .personel-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            border-bottom: 1px solid #eee;
        }
        .btn-personel-sil {
            background-color: var(--danger-color);
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        /* Alan Gizleme/Gösterme */
        .hidden { display: none !important; }
        
        .copyright {
            text-align: center;
            margin-bottom: 20px;
            font-size: 0.85rem;
            color: #6c757d;
        }
    </style>
</head>
<body>

<!-- GİRİŞ EKRANI -->
<div id="login-screen">
    <div id="login-box">
        <h2>Mersin Kadastro<br>İzin Takip Sistemi</h2>
        <form id="login-form">
            <input type="password" id="password-input" placeholder="Şifre" required>
            <button type="submit" id="login-button">Giriş Yap</button>
            <div id="login-status"></div>
        </form>
    </div>
</div>

<!-- ANA UYGULAMA (Gizli) -->
<div id="main-app-wrapper" class="app-content">
    
    <!-- Üst Bar -->
    <div class="container app-header">
        <div class="app-title">Personel İzin Yönetimi</div>
        <div class="action-buttons">
            <button id="btn-open-personel-modal" class="btn-action btn-manage-personel">
                👥 Personel Yönetimi
            </button>
            <button id="btn-download-blank-plan" class="btn-action btn-download-plan">
                📄 2026 Boş Yıllık İzin Çizelgesi İndir
            </button>
        </div>
    </div>

    <!-- Takvim Alanı -->
    <div class="container">
        <div class="calendar-header">
            <button id="prev-month">❮ Önceki Ay</button>
            <h2 id="current-month-year"></h2>
            <button id="next-month">Sonraki Ay ❯</button>
        </div>
        <div class="calendar-grid day-headers">
            <div class="day-header">Pzt</div>
            <div class="day-header">Sal</div>
            <div class="day-header">Çar</div>
            <div class="day-header">Per</div>
            <div class="day-header">Cum</div>
            <div class="day-header">Cmt</div>
            <div class="day-header">Paz</div>
        </div>
        <div class="calendar-grid" id="calendar-body">
            <!-- Takvim JS ile dolacak -->
        </div>
    </div>

    <!-- Aylık Özet ve Raporlar -->
    <div class="container">
        <div class="summary-header">
            <h3>Ayın İzin Özeti</h3>
            <div class="report-buttons">
                <button id="export-monthly-report">Aylık Rapor (Excel)</button>
                <button id="export-yearly-report">Yıllık Rapor (Excel)</button>
            </div>
        </div>
        <div id="monthly-summary" style="padding: 20px;"></div>
    </div>
    
    <!-- Telif Hakkı -->
    <div class="copyright">
        © Gökhan ELGÜL tarafından tasarlanmıştır.
    </div>
</div>

<!-- İzin Ekleme/Düzenleme Modalı -->
<div id="izin-modal" class="modal">
    <div class="modal-content">
        <span class="close-button" id="close-izin-modal">&times;</span>
        <h3 id="modal-title">İzin Girişi</h3>
        <form id="izin-form">
            <input type="hidden" id="izin-id">
            
            <!-- Personel Seçimi -->
            <div>
                <label for="personel-listesi">Personel:</label>
                <select id="personel-listesi" required>
                    <option value="">Yükleniyor...</option>
                </select>
            </div>

            <!-- İzin Türü Seçimi -->
            <div>
                <label>İzin Türü:</label>
                <div class="radio-group">
                    <label><input type="radio" name="izinTuru" value="Günlük" checked> Günlük</label>
                    <label><input type="radio" name="izinTuru" value="Saatlik"> Saatlik</label>
                    <label><input type="radio" name="izinTuru" value="Yıllık İzin"> Yıllık İzin (2026)</label>
                </div>
            </div>

            <!-- Tarih Alanları -->
            <div id="tek-tarih-wrapper">
                <label for="izin-tarihi">İzin Tarihi:</label>
                <input type="date" id="izin-tarihi">
            </div>

            <div id="tarih-araligi-wrapper" class="hidden">
                <label>Yıllık İzin Tarih Aralığı:</label>
                <div class="date-range-group">
                    <div>
                        <small>Başlangıç</small>
                        <input type="date" id="baslangic-tarihi">
                    </div>
                    <div>
                        <small>Bitiş (Dahil)</small>
                        <input type="date" id="bitis-tarihi">
                    </div>
                </div>
            </div>

            <!-- Saatlik Alanı -->
            <div id="saatlik-alan" class="hidden">
                <label>Saat Aralığı:</label>
                <div class="date-range-group">
                    <input type="time" id="baslangic-saati">
                    <input type="time" id="bitis-saati">
                </div>
            </div>

            <!-- Neden -->
            <div>
                <label for="izin-nedeni">Açıklama / Neden (Opsiyonel):</label>
                <input type="text" id="izin-nedeni" placeholder="Örn: Yıllık İzin 1. Parça">
            </div>

            <!-- Butonlar -->
            <div class="form-buttons">
                 <button type="submit" id="save-button">Kaydet</button>
                 <button type="button" id="delete-button">Sil</button>
            </div>
            <div id="status"></div>
        </form>
    </div>
</div>

<!-- Personel Yönetimi Modalı -->
<div id="personel-yonetim-modal" class="modal">
    <div class="modal-content">
        <span class="close-button" id="close-personel-modal">&times;</span>
        <h3>Personel Yönetimi</h3>
        
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <input type="text" id="yeni-personel-adi" placeholder="Yeni Personel Adı Soyadı" style="flex: 1;">
            <button id="btn-personel-ekle" style="background-color: var(--success-color); color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer;">Ekle</button>
        </div>
        
        <div style="max-height: 300px; overflow-y: auto; border: 1px solid #ccc; border-radius: 5px; padding: 10px;">
            <ul id="personel-duzenle-listesi" style="list-style: none; padding: 0; margin: 0;">
                <!-- JS ile dolacak -->
            </ul>
        </div>
        
        <div id="personel-status" style="margin-top: 10px; font-weight: bold; text-align: center;"></div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    // --- SABİTLER VE AYARLAR ---
    const CORRECT_PASSWORD = '2203';
    const GITHUB_OWNER = 'gokhangeo';
    const GITHUB_REPO = 'personelmesai';
    const KAYIT_DOSYASI_YOLU = 'izinler.json';
    const PERSONEL_DOSYASI_YOLU = 'personel.json'; // Yeni dosyamız
    
    // Uygulama ilk kez kurulduğunda veya dosya bulunamadığında kullanılacak varsayılan liste
    const VARSAYILAN_PERSONEL_LISTESI = [
        "AHMET ÇELİK", "AYŞE ÇAKICI PEKÇETİN", "CİHAN KARA", "DUDU POYRAZ", "ENGİN UĞURLU",
        "GÜLİZAR YILDIZ", "HASAN İN", "HAVVA NİLGÜN KIYMAÇ", "HÜSEYİN KURT", "HÜSEYİN POYRAZ",
        "İSMAİL AKLAN", "KEMAL KORKMAZ", "KENAN BAYDEMİR", "LOKMAN ALKAN", "MEHMET CEYLAN",
        "MEHMET NEJAT AY", "MUSTAFA BAYSAL", "MUSTAFA DİKİ", "MUSTAFA GÜRBÜZ", "MÜJDE TÜRKMEN",
        "NURHAN ARSLAN", "ÖZLEM AYDINLI", "SARİYE KUŞÇU", "SERVET ATA", "SEVAL ÇELİK",
        "ŞEHMUS ÖZTÜRK", "TEVFİK YILDIZ", "VOLKAN İZCİ"
    ];
    
    // API Token (Parçalı)
    const tokenParts = ['ghp_2KS6iY', '7t1ka6bKyHw', 'ONJkXdwOU', 'VhrU3PqlSX'];
    const GITHUB_TOKEN = tokenParts.join('');

    // --- DOM ELEMENTLERİ ---
    const loginScreen = document.getElementById('login-screen');
    const mainAppWrapper = document.getElementById('main-app-wrapper');
    const calendarBody = document.getElementById('calendar-body');
    const currentMonthYearEl = document.getElementById('current-month-year');
    
    const izinModal = document.getElementById('izin-modal');
    const personelModal = document.getElementById('personel-yonetim-modal');
    
    const izinForm = document.getElementById('izin-form');
    const personelSelect = document.getElementById('personel-listesi');
    const statusDiv = document.getElementById('status');
    const personelStatusDiv = document.getElementById('personel-status');
    const deleteButton = document.getElementById('delete-button');
    const saveButton = document.getElementById('save-button');
    
    const radioButtons = document.querySelectorAll('input[name="izinTuru"]');
    const tekTarihWrapper = document.getElementById('tek-tarih-wrapper');
    const tarihAraligiWrapper = document.getElementById('tarih-araligi-wrapper');
    const saatlikAlan = document.getElementById('saatlik-alan');
    
    // --- STATE (DURUM) ---
    let currentDate = new Date();
    let izinKayitlari = [];
    let personelListesi = [];

    // ==========================================
    // 1. GİRİŞ İŞLEMLERİ
    // ==========================================
    document.getElementById('login-form').addEventListener('submit', (e) => {
        e.preventDefault();
        if (document.getElementById('password-input').value === CORRECT_PASSWORD) {
            loginScreen.style.display = 'none';
            mainAppWrapper.style.display = 'block';
            initializeApp();
        } else {
            document.getElementById('login-status').textContent = 'Hatalı şifre!';
        }
    });

    // ==========================================
    // 2. YILLIK İZİN ÇİZELGESİ (EXCEL)
    // ==========================================
    document.getElementById('btn-download-blank-plan').addEventListener('click', () => {
        const wb = XLSX.utils.book_new();
        const ws_data = [
            ["MERSİN KADASTRO MÜDÜRLÜĞÜ 2026 YILI YILLIK İZİN PLANLAMA ÇİZELGESİ"],
            ["Personel Adı Soyadı:", "__________________________"],
            ["Ünvanı:", "__________________________"],
            [],
            ["AY", "GÜNLER (Planlanan izin tarihlerini işaretleyiniz)"]
        ];

        const aylar = ["Ocak", "Şubat", "Mart", "Nisan", "Mayıs", "Haziran", "Temmuz", "Ağustos", "Eylül", "Ekim", "Kasım", "Aralık"];
        aylar.forEach(ay => {
            let row = [ay]; 
            for(let i=1; i<=31; i++) row.push(i);
            ws_data.push(row);
        });
        ws_data.push([], ["Onay:", "........................................"]);

        const ws = XLSX.utils.aoa_to_sheet(ws_data);
        const wscols = [{wch:15}];
        for(let i=0; i<31; i++) wscols.push({wch:3});
        ws['!cols'] = wscols;
        ws['!merges'] = [{ s: {r:0, c:0}, e: {r:0, c:10} }]; 

        XLSX.utils.book_append_sheet(wb, ws, "2026_Planlama");
        XLSX.writeFile(wb, "Mersin_Kadastro_2026_Yillik_Izin_Cizelgesi.xlsx");
    });

    // ==========================================
    // 3. API & VERİ İŞLEMLERİ
    // ==========================================
    const githubApiCall = async (url, options = {}) => {
        options.headers = {
            'Authorization': `Bearer ${GITHUB_TOKEN}`,
            'Accept': 'application/vnd.github.v3+json',
            ...options.headers
        };
        return fetch(url, options);
    };

    const initializeApp = async () => {
        await personelleriYukleAPI(); 
        await izinleriYukleAPI();
        renderCalendar();
    };

    // --- PERSONEL VERİ İŞLEMLERİ ---
    const personelleriYukleAPI = async () => {
        try {
            personelSelect.innerHTML = '<option value="">Personel Yükleniyor...</option>';
            const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${PERSONEL_DOSYASI_YOLU}`;
            const res = await githubApiCall(url);
            
            if (res.status === 404) { 
                // İlk kurulum: Github'da personel.json yoksa varsayılanı kullan ve Github'a kaydet
                personelListesi = [...VARSAYILAN_PERSONEL_LISTESI];
                await personelleriKaydetAPI('İlk personel listesi oluşturuldu');
            } else {
                const data = await res.json();
                const content = decodeURIComponent(escape(window.atob(data.content)));
                personelListesi = JSON.parse(content);
            }
            
            // Listeyi her ihtimale karşı alfabetik sırala
            personelListesi.sort((a, b) => a.localeCompare(b, 'tr'));
            personelSelectGuncelle();
            
        } catch (error) {
            console.error('Personel yükleme hatası:', error);
            // Hata olursa en azından varsayılanı göster
            personelListesi = [...VARSAYILAN_PERSONEL_LISTESI];
            personelSelectGuncelle();
        }
    };

    const personelleriKaydetAPI = async (mesaj) => {
        try {
            const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${PERSONEL_DOSYASI_YOLU}`;
            let sha = null;
            const checkRes = await githubApiCall(url);
            if (checkRes.ok) {
                const data = await checkRes.json();
                sha = data.sha;
            }

            // UTF-8 Encode
            const content = window.btoa(unescape(encodeURIComponent(JSON.stringify(personelListesi, null, 2))));

            const res = await githubApiCall(url, {
                method: 'PUT',
                body: JSON.stringify({ message: mesaj, content: content, sha: sha })
            });

            return res.ok;
        } catch (error) {
            console.error('Personel kaydetme hatası:', error);
            return false;
        }
    };

    const personelSelectGuncelle = () => {
        personelSelect.innerHTML = '<option value="">Personel Seçiniz</option>';
        personelListesi.forEach(ad => {
            personelSelect.add(new Option(ad, ad));
        });
    };

    // --- İZİN VERİ İŞLEMLERİ ---
    const izinleriYukleAPI = async () => {
        try {
            const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${KAYIT_DOSYASI_YOLU}`;
            const res = await githubApiCall(url);
            if (res.status === 404) { izinKayitlari = []; return; }
            const data = await res.json();
            const content = decodeURIComponent(escape(window.atob(data.content)));
            izinKayitlari = JSON.parse(content);
        } catch (error) {
            console.error('İzin yükleme hatası:', error);
            izinKayitlari = [];
        }
    };

    const izinleriKaydetAPI = async (mesaj) => {
        try {
            const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${KAYIT_DOSYASI_YOLU}`;
            let sha = null;
            const checkRes = await githubApiCall(url);
            if (checkRes.ok) {
                const data = await checkRes.json();
                sha = data.sha;
            }
            const content = window.btoa(unescape(encodeURIComponent(JSON.stringify(izinKayitlari, null, 2))));
            const res = await githubApiCall(url, {
                method: 'PUT',
                body: JSON.stringify({ message: mesaj, content: content, sha: sha })
            });
            if (!res.ok) throw new Error('Kayıt başarısız');
            return true;
        } catch (error) {
            statusDiv.textContent = 'Hata: ' + error.message;
            statusDiv.className = 'error';
            return false;
        }
    };

    // ==========================================
    // 4. PERSONEL YÖNETİMİ ARAYÜZÜ
    // ==========================================
    document.getElementById('btn-open-personel-modal').addEventListener('click', () => {
        personelStatusDiv.textContent = '';
        personelYonetimListesiniDoldur();
        personelModal.style.display = 'flex';
    });

    const personelYonetimListesiniDoldur = () => {
        const ul = document.getElementById('personel-duzenle-listesi');
        ul.innerHTML = '';
        personelListesi.forEach(ad => {
            const li = document.createElement('li');
            li.className = 'personel-list-item';
            li.innerHTML = `<span>${ad}</span> <button class="btn-personel-sil" data-isim="${ad}">Sil</button>`;
            ul.appendChild(li);
        });

        // Silme butonlarına olay ekle
        document.querySelectorAll('.btn-personel-sil').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const isim = e.target.getAttribute('data-isim');
                if(confirm(`${isim} isimli personeli kalıcı olarak silmek istiyor musunuz?`)) {
                    personelStatusDiv.textContent = 'Siliniyor...';
                    personelStatusDiv.style.color = 'var(--primary-color)';
                    
                    personelListesi = personelListesi.filter(p => p !== isim);
                    const basarili = await personelleriKaydetAPI(`${isim} personellerden silindi`);
                    
                    if(basarili) {
                        personelStatusDiv.textContent = 'Personel silindi.';
                        personelStatusDiv.style.color = 'var(--success-color)';
                        personelSelectGuncelle();
                        personelYonetimListesiniDoldur();
                    } else {
                        personelStatusDiv.textContent = 'Hata oluştu!';
                        personelStatusDiv.style.color = 'var(--danger-color)';
                    }
                }
            });
        });
    };

    document.getElementById('btn-personel-ekle').addEventListener('click', async () => {
        const input = document.getElementById('yeni-personel-adi');
        let isim = input.value.trim().toLocaleUpperCase('tr-TR');
        
        if(!isim) return;
        if(personelListesi.includes(isim)) {
            personelStatusDiv.textContent = 'Bu isim zaten listede var!';
            personelStatusDiv.style.color = 'var(--danger-color)';
            return;
        }

        personelStatusDiv.textContent = 'Ekleniyor...';
        personelStatusDiv.style.color = 'var(--primary-color)';

        personelListesi.push(isim);
        personelListesi.sort((a, b) => a.localeCompare(b, 'tr')); // Alfabetik sıraya geri sok

        const basarili = await personelleriKaydetAPI(`${isim} listeye eklendi`);
        
        if(basarili) {
            input.value = '';
            personelStatusDiv.textContent = 'Yeni personel eklendi!';
            personelStatusDiv.style.color = 'var(--success-color)';
            personelSelectGuncelle();
            personelYonetimListesiniDoldur();
        } else {
            // Hata olursa ekleneni geri al
            personelListesi = personelListesi.filter(p => p !== isim);
            personelStatusDiv.textContent = 'Kayıt sırasında hata oluştu!';
            personelStatusDiv.style.color = 'var(--danger-color)';
        }
    });

    document.getElementById('close-personel-modal').onclick = () => personelModal.style.display = 'none';

    // ==========================================
    // 5. TAKVİM VE ARAYÜZ
    // ==========================================
    const renderCalendar = () => {
        calendarBody.innerHTML = '';
        const year = currentDate.getFullYear();
        const month = currentDate.getMonth();
        
        const ayIsimleri = ["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];
        currentMonthYearEl.textContent = `${ayIsimleri[month]} ${year}`;

        const firstDay = new Date(year, month, 1);
        const lastDay = new Date(year, month + 1, 0);
        
        let startDay = firstDay.getDay() - 1;
        if (startDay === -1) startDay = 6;

        for(let i=0; i<startDay; i++) {
            const div = document.createElement('div');
            div.className = 'day-cell other-month';
            calendarBody.appendChild(div);
        }

        for(let d=1; d<=lastDay.getDate(); d++) {
            const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const cell = document.createElement('div');
            cell.className = 'day-cell';
            
            const today = new Date();
            if(d === today.getDate() && month === today.getMonth() && year === today.getFullYear()) {
                cell.className += ' today';
            }

            const numDiv = document.createElement('div');
            numDiv.className = 'day-number';
            numDiv.textContent = d;
            cell.appendChild(numDiv);

            const gununIzinleri = izinKayitlari.filter(i => i.tarih === dateStr);
            gununIzinleri.forEach(izin => {
                const div = document.createElement('div');
                div.textContent = `${izin.adSoyad.split(' ')[0]} - ${izin.izinTuru === 'Saatlik' ? izin.saatAraligi : (izin.izinTuru === 'Yıllık İzin' ? 'Yıllık' : 'Günlük')}`;
                div.title = izin.neden || '';
                
                div.className = 'izin-entry';
                if (izin.izinTuru === 'Yıllık İzin') div.classList.add('type-yillik');
                else if (izin.izinTuru === 'Saatlik') div.classList.add('type-saatlik');
                else div.classList.add('type-gunluk');

                div.onclick = (e) => { e.stopPropagation(); openIzinModal(dateStr, izin.id); };
                cell.appendChild(div);
            });

            cell.onclick = () => openIzinModal(dateStr);
            calendarBody.appendChild(cell);
        }
        
        renderSummary(year, month);
    };

    const renderSummary = (year, month) => {
        const div = document.getElementById('monthly-summary');
        div.innerHTML = '';
        
        const buAyinIzinleri = izinKayitlari.filter(i => {
            const d = new Date(i.tarih);
            return d.getFullYear() === year && d.getMonth() === month;
        }).sort((a,b) => new Date(a.tarih) - new Date(b.tarih));

        if(buAyinIzinleri.length === 0) {
            div.innerHTML = '<p style="text-align:center; color:#999">Bu ay kayıtlı izin yok.</p>';
            return;
        }

        const ul = document.createElement('ul');
        ul.style.listStyle = 'none';
        ul.style.padding = 0;

        buAyinIzinleri.forEach(izin => {
            const li = document.createElement('li');
            li.style.borderBottom = '1px solid #eee';
            li.style.padding = '8px 0';
            
            const tarihTr = new Date(izin.tarih).toLocaleDateString('tr-TR');
            
            let detay = '';
            if(izin.izinTuru === 'Yıllık İzin') detay = '<strong style="color:green">[Yıllık İzin]</strong>';
            else if(izin.izinTuru === 'Saatlik') detay = `<span style="color:orange">[Saatlik: ${izin.saatAraligi}]</span>`;
            else detay = '<span style="color:#d4a017">[Günlük]</span>';

            li.innerHTML = `<strong>${tarihTr}</strong> - <b>${izin.adSoyad}</b> ${detay} <br><small>${izin.neden || ''}</small>`;
            ul.appendChild(li);
        });
        div.appendChild(ul);
    };

    // ==========================================
    // 6. MODAL VE FORM İŞLEMLERİ (İZİN)
    // ==========================================
    const openIzinModal = (dateStr, id = null) => {
        izinForm.reset();
        statusDiv.textContent = '';
        statusDiv.className = '';
        document.getElementById('izin-id').value = id || '';
        
        tekTarihWrapper.classList.remove('hidden');
        tarihAraligiWrapper.classList.add('hidden');
        saatlikAlan.classList.add('hidden');
        saveButton.textContent = 'Kaydet';
        deleteButton.style.display = id ? 'block' : 'none';

        if(id) {
            const rec = izinKayitlari.find(r => r.id == id);
            if(!rec) return;

            personelSelect.value = rec.adSoyad;
            document.querySelector(`input[name="izinTuru"][value="${rec.izinTuru}"]`).checked = true;
            document.getElementById('izin-nedeni').value = rec.neden || '';
            document.getElementById('izin-tarihi').value = rec.tarih; 
            
            if(rec.izinTuru === 'Saatlik') {
                saatlikAlan.classList.remove('hidden');
                const [b, s] = (rec.saatAraligi || '-').split('-');
                document.getElementById('baslangic-saati').value = b ? b.trim() : '';
                document.getElementById('bitis-saati').value = s ? s.trim() : '';
            }
            document.getElementById('modal-title').textContent = 'İzin Düzenle';
        } else {
            document.getElementById('izin-tarihi').value = dateStr;
            document.getElementById('baslangic-tarihi').value = dateStr; 
            document.getElementById('modal-title').textContent = 'Yeni İzin Girişi';
        }
        
        updateFormView(); 
        izinModal.style.display = 'flex';
    };

    const updateFormView = () => {
        const tur = document.querySelector('input[name="izinTuru"]:checked').value;
        const id = document.getElementById('izin-id').value;

        if (id) {
            tarihAraligiWrapper.classList.add('hidden');
            tekTarihWrapper.classList.remove('hidden');
        } else {
            if (tur === 'Yıllık İzin') {
                tekTarihWrapper.classList.add('hidden');
                tarihAraligiWrapper.classList.remove('hidden');
            } else {
                tekTarihWrapper.classList.remove('hidden');
                tarihAraligiWrapper.classList.add('hidden');
            }
        }

        if (tur === 'Saatlik') {
            saatlikAlan.classList.remove('hidden');
        } else {
            saatlikAlan.classList.add('hidden');
        }
    };

    radioButtons.forEach(rb => rb.addEventListener('change', updateFormView));

    izinForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        statusDiv.textContent = 'Kaydediliyor...';
        statusDiv.className = '';

        const id = document.getElementById('izin-id').value;
        const adSoyad = personelSelect.value;
        const izinTuru = document.querySelector('input[name="izinTuru"]:checked').value;
        const neden = document.getElementById('izin-nedeni').value;
        
        if (!adSoyad) { statusDiv.textContent = 'Personel seçiniz!'; return; }

        let yeniKayitlar = [];

        if (izinTuru === 'Yıllık İzin' && !id) {
            const baslangic = new Date(document.getElementById('baslangic-tarihi').value);
            const bitis = new Date(document.getElementById('bitis-tarihi').value);
            
            if (isNaN(baslangic) || isNaN(bitis) || baslangic > bitis) {
                statusDiv.textContent = 'Geçerli bir tarih aralığı giriniz!';
                return;
            }

            for (let d = new Date(baslangic); d <= bitis; d.setDate(d.getDate() + 1)) {
                yeniKayitlar.push({
                    id: Date.now() + Math.random(),
                    adSoyad,
                    izinTuru,
                    tarih: d.toISOString().split('T')[0],
                    saatAraligi: '',
                    neden
                });
            }
        } else {
            const tarih = document.getElementById('izin-tarihi').value;
            let saatAraligi = '';
            
            if (izinTuru === 'Saatlik') {
                const s1 = document.getElementById('baslangic-saati').value;
                const s2 = document.getElementById('bitis-saati').value;
                if(!s1 || !s2) { statusDiv.textContent = 'Saatleri giriniz!'; return; }
                saatAraligi = `${s1} - ${s2}`;
            }

            yeniKayitlar.push({
                id: id ? parseFloat(id) : Date.now(),
                adSoyad,
                izinTuru,
                tarih,
                saatAraligi,
                neden
            });
        }

        if (id) {
            izinKayitlari = izinKayitlari.filter(k => k.id != id);
            izinKayitlari.push(yeniKayitlar[0]);
        } else {
            izinKayitlari.push(...yeniKayitlar);
        }

        const success = await izinleriKaydetAPI(id ? `Düzenleme: ${adSoyad}` : `Yeni Kayıt: ${adSoyad}`);
        
        if (success) {
            statusDiv.textContent = 'Başarılı!';
            statusDiv.className = 'success';
            renderCalendar();
            setTimeout(() => { izinModal.style.display = 'none'; }, 1000);
        }
    });

    deleteButton.addEventListener('click', async () => {
        const id = document.getElementById('izin-id').value;
        if (!confirm('Bu izni silmek istiyor musunuz?')) return;
        
        izinKayitlari = izinKayitlari.filter(k => k.id != id);
        const success = await izinleriKaydetAPI('İzin silindi');
        
        if(success) {
            izinModal.style.display = 'none';
            renderCalendar();
        }
    });

    document.getElementById('close-izin-modal').onclick = () => izinModal.style.display = 'none';
    window.onclick = (e) => { 
        if(e.target == izinModal) izinModal.style.display = 'none'; 
        if(e.target == personelModal) personelModal.style.display = 'none';
    };
    
    document.getElementById('prev-month').onclick = () => { currentDate.setMonth(currentDate.getMonth()-1); renderCalendar(); };
    document.getElementById('next-month').onclick = () => { currentDate.setMonth(currentDate.getMonth()+1); renderCalendar(); };

    // --- RAPOR BUTONLARI ---
    const exportExcel = (data, name) => {
        if(!data.length) { alert('Veri yok'); return; }
        const ws = XLSX.utils.json_to_sheet(data.map(i => ({
            'Personel': i.adSoyad,
            'Tarih': i.tarih,
            'Tür': i.izinTuru,
            'Saat': i.saatAraligi,
            'Neden': i.neden
        })));
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Rapor");
        XLSX.writeFile(wb, name + ".xlsx");
    };

    document.getElementById('export-monthly-report').onclick = () => {
        const y = currentDate.getFullYear(), m = currentDate.getMonth();
        const data = izinKayitlari.filter(i => { const d=new Date(i.tarih); return d.getFullYear()===y && d.getMonth()===m; });
        exportExcel(data, `Aylik_Rapor_${y}_${m+1}`);
    };
    
    document.getElementById('export-yearly-report').onclick = () => {
        const y = currentDate.getFullYear();
        const data = izinKayitlari.filter(i => new Date(i.tarih).getFullYear()===y);
        exportExcel(data, `Yillik_Rapor_${y}`);
    };
});
</script>
</body>
</html>
